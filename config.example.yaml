# Auto Style Capture Configuration
# Copy to config.yaml and modify as needed

author_name: "Ernest Hemingway"

llm:
  # Model identifiers follow litellm format: provider/model
  # Examples: openai/gpt-5-mini, openai/gpt-4o, together_ai/meta-llama/Llama-3-70b
  generator_model: "openai/gpt-5-mini"
  judge_model: "openai/gpt-5-mini"
  updater_model: "openai/gpt-5-mini"
  temperature_generator: 0.8
  temperature_judge: 0.2
  temperature_updater: 0.4

corpus:
  path: "./corpus"
  formats: [".txt", ".md", ".json"]
  holdout_ratio: 0.2
  json_text_field: "text"  # field name for JSON corpus files

loop:
  max_iterations: 10
  convergence_threshold: 0.55  # stop when discriminator accuracy drops below this
  min_iterations: 3            # minimum iterations before early stop allowed
  samples_per_iteration: 5     # generated texts per round
  plateau_window: 3            # iterations to check for plateau
  plateau_min_delta: 0.02      # minimum improvement to not be considered plateau

discriminator:
  ml_weight: 0.5
  llm_weight: 0.5

output_dir: "./output"
save_intermediates: true
